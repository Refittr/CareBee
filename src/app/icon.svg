<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Honey hexagon background -->
  <polygon points="16,2 28,9 28,23 16,30 4,23 4,9" fill="#E8A817"/>
  <!-- Bee icon centred at 16,16, scaled ~1.6x from 16px original -->
  <!-- Wings -->
  <ellipse cx="9.5" cy="14.5" rx="5" ry="2.5" fill="white" opacity="0.35" transform="rotate(-20 9.5 14.5)"/>
  <ellipse cx="22.5" cy="14.5" rx="5" ry="2.5" fill="white" opacity="0.35" transform="rotate(20 22.5 14.5)"/>
  <!-- Abdomen -->
  <ellipse cx="16" cy="22" rx="3.8" ry="5.5" fill="white"/>
  <!-- Stripes -->
  <rect x="12.2" y="19.2" width="7.6" height="1.5" rx="0.75" fill="#E8A817" opacity="0.7"/>
  <rect x="12.2" y="21.8" width="7.6" height="1.5" rx="0.75" fill="#E8A817" opacity="0.7"/>
  <!-- Thorax -->
  <ellipse cx="16" cy="15.5" rx="3.2" ry="2.5" fill="white"/>
  <!-- Head -->
  <circle cx="16" cy="11.5" r="2.4" fill="white"/>
  <!-- Antennae -->
  <line x1="14.8" y1="9.5" x2="12.5" y2="6.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="17.2" y1="9.5" x2="19.5" y2="6.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="12.2" cy="6.2" r="0.9" fill="white"/>
  <circle cx="19.8" cy="6.2" r="0.9" fill="white"/>
</svg>
